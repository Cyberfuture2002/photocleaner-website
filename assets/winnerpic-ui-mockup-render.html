<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Winnerpic UI Mockup Render</title>
  <style>
    html, body {
      margin: 0;
      background: #ffffff;
      width: 3200px;
      height: 2200px;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
    }

    .frame {
      width: 2800px;
      height: 1680px;
      display: grid;
      place-items: center;
      background: #ffffff;
    }

    img {
      width: 2800px;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img src="winnerpic-ui-mockup.svg" alt="Winnerpic UI Mockup">
  </div>
</body>
</html>
