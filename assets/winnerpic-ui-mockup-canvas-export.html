<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Winnerpic UI Mockup Canvas Export</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: start center;
      padding: 0;
    }

    canvas {
      display: block;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <canvas id="mockup" width="2800" height="1680"></canvas>
  <script>
    const canvas = document.getElementById('mockup');
    const context = canvas.getContext('2d');
    const image = new Image();
    image.onload = () => {
      context.fillStyle = '#ffffff';
      context.fillRect(0, 0, canvas.width, canvas.height);
      context.drawImage(image, 0, 0, canvas.width, canvas.height);
      document.title = 'render-complete';
    };
    image.onerror = () => {
      document.title = 'render-failed';
    };
    image.src = 'winnerpic-ui-mockup.svg';
  </script>
</body>
</html>
